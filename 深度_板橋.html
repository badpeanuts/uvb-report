function b2a(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function tryDec(pw){
 const raw=b2a(B64);
 const salt=raw.slice(8,16), ct=raw.slice(16);           // openssl "Salted__"+salt(8)+ciphertext
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
 const bits=await crypto.subtle.deriveBits({name:'PBKDF2',hash:'SHA-256',salt:salt,iterations:600000},km,384);
 const kb=new Uint8Array(bits);
 const key=await crypto.subtle.importKey('raw',kb.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:kb.slice(32,48)},key,ct);
 const txt=new TextDecoder().decode(pt);
 if(!txt.startsWith('UVBOK::'))throw new Error('bad');
 return txt.slice(7);
}
async function dec(){
 const pw=document.getElementById('pw').value;if(!pw)return;
 const btn=document.getElementById('go');btn.disabled=true;btn.textContent='解密中…';
 try{
  const html=await tryDec(pw);
  if(document.getElementById('rm').checked)localStorage.setItem('uvb_pw_深度_板橋',pw);
  document.open();document.write(html);document.close();
 }catch(e){
  document.getElementById('err').style.display='block';
  btn.disabled=false;btn.textContent='開啟報表';
  localStorage.removeItem('uvb_pw_深度_板橋');
 }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')dec();});
(async()=>{const s=localStorage.getItem('uvb_pw_深度_板橋');
 if(s){document.getElementById('pw').value=s;document.getElementById('rm').checked=true;dec();}})();
