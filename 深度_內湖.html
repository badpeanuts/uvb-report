async function tryDec(pw){

 const salt=raw.slice(8,16), ct=raw.slice(16);           // openssl "Salted__"+salt(8)+ciphertext
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
 const bits=await crypto.subtle.deriveBits({name:'PBKDF2',hash:'SHA-256',salt:salt,iterations:600000},km,384);
 const kb=new Uint8Array(bits);
 const key=await crypto.subtle.importKey('raw',kb.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:kb.slice(32,48)},key,ct);
 const txt=new TextDecoder().decode(pt);
 if(!txt.startsWith('UVBOK::'))throw new Error('bad');
 return txt.slice(7);
}
